<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Kamran Khan - Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .pulse-circle {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: pulse 3s ease-out infinite;
        }

        .pulse-circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .pulse-circle:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: -150px;
            animation-delay: 0.5s;
        }

        .pulse-circle:nth-child(3) {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 20%;
            animation-delay: 1s;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                border-color: rgba(255, 255, 255, 0.3);
            }
            50% {
                border-color: rgba(255, 255, 255, 0.1);
            }
            100% {
                transform: scale(1.3);
                border-color: rgba(255, 255, 255, 0);
            }
        }

        /* Floating Medical Icons */
        .floating-icon {
            position: absolute;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .floating-icon:nth-child(4) {
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-icon:nth-child(5) {
            top: 60%;
            right: 15%;
            animation-delay: 1s;
        }

        .floating-icon:nth-child(6) {
            bottom: 20%;
            left: 5%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-30px);
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Container */
        .logo-container {
            margin-bottom: 40px;
            animation: logoSlide 1s ease-out 0.2s both;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: logoGlow 2s ease-in-out infinite;
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes logoSlide {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes logoGlow {
            0%, 100% {
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                border-color: rgba(255, 255, 255, 0.2);
            }
            50% {
                box-shadow: 0 30px 80px rgba(255, 255, 255, 0.3);
                border-color: rgba(255, 255, 255, 0.4);
            }
        }

        /* Doctor Name */
        .doctor-name {
            font-size: 3.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: textSlide 1s ease-out 0.4s both;
            letter-spacing: 1px;
        }

        @keyframes textSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .doctor-title {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
            animation: subtitleSlide 1s ease-out 0.6s both;
            letter-spacing: 0.5px;
        }

        @keyframes subtitleSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Coming Soon Text */
        .coming-soon-text {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 40px;
            animation: comingSoonAnimation 1s ease-out 0.8s both;
            letter-spacing: 2px;
        }

        @keyframes comingSoonAnimation {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Medical Icons Row */
        .medical-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            animation: iconsSlide 1s ease-out 1s both;
        }

        .medical-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            animation: iconBounce 2s ease-in-out infinite;
        }

        .medical-icon:nth-child(1) { animation-delay: 0s; }
        .medical-icon:nth-child(2) { animation-delay: 0.2s; }
        .medical-icon:nth-child(3) { animation-delay: 0.4s; }

        .medical-icon:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        @keyframes iconBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes iconsSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading Animation */
        .loading-dots {
            display: inline-flex;
            gap: 8px;
            margin-bottom: 40px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: dotAnimation 1.4s infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotAnimation {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Email Notification Section */
        .email-section {
            margin-top: 40px;
            animation: emailSlide 1s ease-out 1.2s both;
        }

        .email-text {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
        }

        .email-input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }

        .email-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .email-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .email-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .notify-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
        }

        .notify-btn:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .notify-btn:active {
            transform: translateY(0);
        }

        @keyframes emailSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design - Tablet (768px and below) */
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            .container {
                padding: 20px;
            }

            .doctor-name {
                font-size: 2.5rem;
                margin-bottom: 10px;
            }

            .doctor-title {
                font-size: 1rem;
                margin-bottom: 20px;
            }

            .coming-soon-text {
                font-size: 1.4rem;
                margin-bottom: 25px;
            }

            .logo-container {
                margin-bottom: 30px;
            }

            .logo {
                width: 120px;
                height: 120px;
            }

            .medical-icons {
                gap: 20px;
                margin-bottom: 35px;
            }

            .medical-icon {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .email-input-wrapper {
                flex-direction: column;
                gap: 12px;
            }

            .email-input,
            .notify-btn {
                padding: 14px 16px;
                font-size: 1rem;
            }

            .notify-btn {
                min-height: 48px;
                font-size: 1rem;
                font-weight: 600;
            }

            .floating-icon {
                font-size: 2rem;
            }

            /* Reduce animation complexity on tablet */
            .pulse-circle {
                animation: pulse 4s ease-out infinite;
            }

            .floating-icon {
                animation: float 8s ease-in-out infinite;
            }
        }

        /* Mobile Phones (480px and below) */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 15px;
                max-width: 100%;
            }

            .doctor-name {
                font-size: 2rem;
                margin-bottom: 8px;
                line-height: 1.2;
            }

            .coming-soon-text {
                font-size: 1.3rem;
                margin-bottom: 20px;
                letter-spacing: 1px;
            }

            .doctor-title {
                font-size: 0.9rem;
                margin-bottom: 15px;
                font-weight: 500;
            }

            .logo-container {
                margin-bottom: 25px;
            }

            .logo {
                width: 90px;
                height: 90px;
            }

            .medical-icons {
                gap: 12px;
                margin-bottom: 25px;
                margin-top: 20px;
            }

            .medical-icon {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }

            .loading-dots {
                margin-bottom: 25px;
            }

            .dot {
                width: 10px;
                height: 10px;
            }

            .email-section {
                margin-top: 30px;
            }

            .email-text {
                font-size: 0.9rem;
                margin-bottom: 12px;
            }

            .email-input-wrapper {
                flex-direction: column;
                gap: 10px;
            }

            .email-input {
                padding: 12px 14px;
                font-size: 16px;
                border-radius: 6px;
                min-height: 44px;
                -webkit-appearance: none;
            }

            .notify-btn {
                padding: 12px 16px;
                min-height: 44px;
                font-size: 0.95rem;
                border-radius: 6px;
                -webkit-appearance: none;
            }

            .floating-icon {
                font-size: 1.5rem;
            }

            /* Hide pulse circles on small screens for performance */
            .pulse-circle {
                display: none;
            }

            /* Reduce animation delays for faster perceived load */
            .logo-container {
                animation-delay: 0.1s !important;
            }

            .doctor-name {
                animation-delay: 0.2s !important;
            }

            .doctor-title {
                animation-delay: 0.3s !important;
            }

            .coming-soon-text {
                animation-delay: 0.4s !important;
            }

            .medical-icons {
                animation-delay: 0.5s !important;
            }

            .email-section {
                animation-delay: 0.6s !important;
            }
        }

        /* Extra Small Phones (360px and below) */
        @media (max-width: 360px) {
            .doctor-name {
                font-size: 1.7rem;
            }

            .coming-soon-text {
                font-size: 1.1rem;
            }

            .logo {
                width: 80px;
                height: 80px;
            }

            .medical-icon {
                width: 40px;
                height: 40px;
                font-size: 0.9rem;
            }

            .doctor-title {
                font-size: 0.8rem;
            }

            .container {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="background-animation">
        <div class="pulse-circle"></div>
        <div class="pulse-circle"></div>
        <div class="pulse-circle"></div>
        <i class="fas fa-heartbeat floating-icon"></i>
        <i class="fas fa-stethoscope floating-icon"></i>
        <i class="fas fa-capsules floating-icon"></i>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="logo.jpg" alt="Kamran Physio Clinic Logo" class="logo">
        </div>

        <!-- Doctor Name -->
        <h1 class="doctor-name">Dr. Kamran Khan</h1>
        <p class="doctor-title">Senior Physiotherapist & Rehabilitation Specialist</p>

        <!-- Coming Soon Text -->
        <h2 class="coming-soon-text">Coming Soon</h2>

        <!-- Loading Animation -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Medical Icons -->
        <div class="medical-icons">
            <div class="medical-icon">
                <i class="fas fa-heart"></i>
            </div>
            <div class="medical-icon">
                <i class="fas fa-brain"></i>
            </div>
            <div class="medical-icon">
                <i class="fas fa-hands"></i>
            </div>
        </div>

        <!-- Email Notification -->
        <div class="email-section">
            <p class="email-text">Be the first to know when we launch</p>
            <div class="email-input-wrapper">
                <input type="email" class="email-input" placeholder="Enter your email" required>
                <button class="notify-btn">Notify Me</button>
            </div>
        </div>
    </div>

    <script>
        // Email notification functionality
        document.querySelector('.notify-btn').addEventListener('click', function() {
            const email = document.querySelector('.email-input').value;
            if (email && email.includes('@')) {
                alert('Thank you! We will notify you when we launch.');
                document.querySelector('.email-input').value = '';
            } else {
                alert('Please enter a valid email address.');
            }
        });

        // Allow Enter key to submit
        document.querySelector('.email-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.querySelector('.notify-btn').click();
            }
        });
    </script>
</body>
</html>
